name: Build SWBF2 Classic Hack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build with MSBuild
      shell: cmd
      run: |
        set INCLUDE=%CD%\SWBF2ClassicInternalHax\external;%INCLUDE%
        msbuild SWBF2ClassicInternalHax.sln /p:Configuration=Release /p:Platform=x86 /restore /m

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SWBF2ClassicHack-x86-Release
        path: |
          build/**/*.dll
        retention-days: 30
        if-no-files-found: warn

name: Build SWBF2 Classic Hack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create external directory
      shell: cmd
      run: |
        mkdir external

    - name: Fetch GLM (math library)
      shell: cmd
      run: |
        git clone https://github.com/g-truc/glm.git external/glm --depth 1

    - name: Fetch ImGui
      shell: cmd
      run: |
        git clone https://github.com/ocornut/imgui.git external/ImGui --depth 1

    - name: Fetch MinHook
      shell: cmd
      run: |
        git clone https://github.com/TsudaKageyu/minhook.git external/minhook --depth 1

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build with MSBuild
      shell: cmd
      run: |
        msbuild SWBF2ClassicInternalHax.sln /p:Configuration=Release /p:Platform=x86 /restore /m

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SWBF2ClassicHack-x86-Release
        path: |
          build/**/*.dll
          **/Release/*.dll
        retention-days: 30
        if-no-files-found: warn

name: Build SWBF2 Classic Hack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release]
        platform: [x86]  # Important for SWBF2 which is 32-bit
        
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.20.x'
        
    - name: Configure CMake
      shell: bash
      run: |
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} \
          -A Win32  # Force x86 architecture
          
    - name: Build
      shell: bash
      run: |
        cmake --build build --config ${{ matrix.configuration }} --parallel
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SWBF2ClassicHack-${{ matrix.platform }}-${{ matrix.configuration }}
        path: build/**/*.dll
        retention-days: 30
        if-no-files-found: warn

name: Build SWBF2 Classic Hack

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fix include paths in vcxproj
      shell: pwsh
      run: |
        $vcxproj = "SWBF2ClassicInternalHax\SWBF2ClassicInternalHax.vcxproj"
        $content = Get-Content $vcxproj -Raw
        $absPath = (Get-Location).Path + "\SWBF2ClassicInternalHax\external"
        $content = $content.Replace("SWBF2ClassicInternalHax\external", $absPath)
        Set-Content $vcxproj -Value $content -NoNewline

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build with MSBuild
      shell: cmd
      run: |
        msbuild SWBF2ClassicInternalHax.sln /p:Configuration=Release /p:Platform=x86 /restore /m

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SWBF2ClassicHack-x86-Release
        path: |
          build/**/*.dll
        if-no-files-found: warn
